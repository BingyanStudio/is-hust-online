syntax = "proto3";
package net.bingyan.hust_uptime.v1;

import "net/bingyan/hust_uptime/v1/check.proto";

option go_package = "github.com/BingyanStudio/is-hust-online/pkg/proto";

enum ClientStatus {
  CLIENT_STATUS_UNKNOWN = 0;
  CLIENT_STATUS_ONLINE = 1;
  CLIENT_STATUS_BUSY = 2;
  CLIENT_STATUS_DEGRADED = 3;
  CLIENT_STATUS_OFFLINE = 4;
}

message ClientInfo {
  string ip = 1;
  repeated CheckType capabilities = 2;
}

message RegisterRequest {
  ClientInfo client_info = 1;
}

message RegisterResponse {
  string client_id = 1;
  bool success = 2;
  string message = 3;
}

message HeartbeatRequest {
  string client_id = 1;
  ClientStatus status = 2;
}

message HeartbeatResponse {
  bool success = 1;
  int64 server_time = 2;
}

message DeregisterRequest {
  string client_id = 1;
}

message DeregisterResponse {
  bool success = 1;
}
